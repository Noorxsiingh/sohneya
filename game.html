<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💕 Math & Love Quiz 💕</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #f5e6da, #f8c8dc);
      color: #5a4a42;
      text-align: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      max-width: 550px;
      width: 100%;
    }

    h1 {
      margin-bottom: 10px;
    }

    .question {
      font-size: 22px;
      margin: 20px 0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .option-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 20px;
      background: #f8c8dc;
      cursor: pointer;
      transition: 0.3s;
      font-size: 16px;
      color: #5a4a42;
    }

    .option-btn:hover {
      background: #f5a9c2;
      transform: scale(1.03);
    }

    .progress {
      margin-top: 15px;
      font-size: 14px;
      color: #777;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      min-height: 24px;
    }

    .hidden {
      display: none;
    }

    .surprises button {
      display: block;
      width: 90%;
      margin: 10px auto;
    }

    a {
      text-decoration: none;
    }

    .back-btn {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 20px;
      background: #f8c8dc;
      cursor: pointer;
      font-size: 16px;
      color: #5a4a42;
    }

    .back-btn:hover {
      background: #f5a9c2;
    }
  </style>
</head>
<body>

<div class="card">

  <h1>💕 Math & Love Quiz 💕</h1>
  <p>Answer all 5 correctly in a row to unlock a surprise 🎁</p>

  <div id="game">
    <div class="question" id="question">
      Loading...
    </div>

    <div class="progress" id="progress">
      Streak: 0 / 5
    </div>

    <div class="result" id="result"></div>
  </div>

  <div id="surprises" class="hidden">
    <h2>🎉 You did it!</h2>
    <p>Choose your surprise:</p>

    <div class="surprises">
      <button onclick="pick('date')">
        💖 i eat you with either syrup or honey
      </button>

      <button onclick="pick('letter')">
        💌 i bind you completely...you do nothing
      </button>

      <button onclick="pick('hug')">
        🧸 i can use ice however i want on you..
      </button>
    </div>

    <div id="finalMessage" class="result"></div>
  </div>

  <a href="index.html">
    <button class="back-btn">⬅ Back</button>
  </a>

</div>

<script>
  const questions = [
    {
      q: "What is 9 + 8?",
      options: ["17", "18", "16"],
      correct: "17"
    },
    {
      q: "What is 6 × 7?",
      options: ["42", "36", "48"],
      correct: "42"
    },
    {
      q: "When did we first kiss? 💕",
      options: ["23 November", "12 December", "14 February"],
      correct: "23 November"
    },
    {
      q: "What is 5³?",
      options: ["125", "25", "100"],
      correct: "125"
    },
    {
      q: "If x = 4, what is 2x² + 1?",
      options: ["33", "17", "25"],
      correct: "33"
    }
  ];

  let index = 0;
  let streak = 0;

  const questionEl = document.getElementById("question");
  const progressEl = document.getElementById("progress");
  const resultEl = document.getElementById("result");
  const game = document.getElementById("game");
  const surprises = document.getElementById("surprises");

  function loadQuestion() {
    const current = questions[index];

    questionEl.innerHTML = `
      <p>${current.q}</p>

      <div class="options">
        ${current.options.map(option => `
          <button class="option-btn" onclick="checkAnswer('${option}')">
            ${option}
          </button>
        `).join("")}
      </div>
    `;

    resultEl.textContent = "";
  }

  function checkAnswer(answer) {
    const correct = questions[index].correct;

    if (answer === correct) {
      streak++;
      resultEl.textContent = "Correct 💖";
      resultEl.style.color = "green";

      index++;

      if (streak === 5) {
        setTimeout(() => {
          game.classList.add("hidden");
          surprises.classList.remove("hidden");
        }, 500);
      } else {
        setTimeout(() => {
          loadQuestion();
        }, 500);
      }

    } else {
      streak = 0;
      index = 0;

      resultEl.textContent = "Wrong 😅 Streak reset!";
      resultEl.style.color = "crimson";

      setTimeout(() => {
        loadQuestion();
      }, 1000);
    }

    progressEl.textContent = `Streak: ${streak} / 5`;
  }

  function pick(choice) {
    const msg = document.getElementById("finalMessage");

    if (choice === "date") {
      msg.textContent =
        "💖 Let me know whether you want syrup or honey!";
    }

    if (choice === "letter") {
      msg.textContent =
        "💌 I'll surprise you.";
    }

    if (choice === "hug") {
      msg.textContent =
        "🧸 PS: Don't tell me to stop ;)";
    }
  }

  loadQuestion();
</script>

</body>
</html>
